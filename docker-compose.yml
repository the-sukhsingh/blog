# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Zero-Config Self-hosted Supabase + Next.js Blog CMS stack
#
# Services:
#   db        Supabase PostgreSQL 15 (with extensions)
#   auth      GoTrue (Supabase auth service — needed by storage-api for JWT)
#   rest      PostgREST (REST API over the database)
#   meta      postgres-meta (DB introspection API — used by Studio)
#   storage   Supabase Storage API
#   imgproxy  Image transformation service (used by storage for resizing)
#   kong      API gateway (routes /auth, /storage, /rest on port 8000)
#   studio    Supabase Studio dashboard (DB GUI on port 3001)
#   app       Next.js Blog CMS (built from local Dockerfile on port 3000)
#
# Usage:
#   docker compose up -d        # start full stack (zero configuration needed!)
#   docker compose logs -f app  # watch the app start
# ══════════════════════════════════════════════════════════════════════════════

name: blog-cms

###############################################################################
# Networks
###############################################################################
networks:
  supabase_net:
    driver: bridge

###############################################################################
# Volumes
###############################################################################
volumes:
  db-data:
    driver: local
  storage-data:
    driver: local

###############################################################################
# Services
###############################################################################
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: supabase/postgres:15.8.1.080
    restart: unless-stopped
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: ${POSTGRES_PORT:-5432}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PGPASSWORD: ${POSTGRES_PASSWORD:-super_secret_postgres_password_123}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_secret_postgres_password_123}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - supabase_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── GoTrue (Auth service) ───────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-super_secret_postgres_password_123}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS:-}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-true}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-false}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Blog CMS}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/recover}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
      GOTRUE_LOG_LEVEL: ${LOG_LEVEL:-error}
    networks:
      - supabase_net

  # ── PostgREST ────────────────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD:-super_secret_postgres_password_123}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    networks:
      - supabase_net

  # ── postgres-meta ────────────────────────────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST:-db}
      PG_META_DB_PORT: ${POSTGRES_PORT:-5432}
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-super_secret_postgres_password_123}
    networks:
      - supabase_net

  # ── imgproxy ─────────────────────────────────────────────────────────────────
  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage:ro
    networks:
      - supabase_net

  # ── Storage API ──────────────────────────────────────────────────────────────
  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
      ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjI1MDAwMDAwMDB9.3tomIeyNGrqv-T95pnouk4OsMPKO-FZm5XpsQdrJLc8}
      SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjUwMDAwMDAwMH0.CqUNvoaexyAipJyzuDKjgINP_827FDmYWpyIHD8jEMQ}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-super_secret_postgres_password_123}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: supa-storage-local
      IMGPROXY_URL: http://imgproxy:8080
      ENABLE_IMAGE_TRANSFORMATION: "true"
      AUTH_JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_32_characters_long_123}
      SERVER_PORT: 5000
    volumes:
      - storage-data:/var/lib/storage
    networks:
      - supabase_net

  # ── Kong API Gateway ─────────────────────────────────────────────────────────
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_started
      storage:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_PLUGINS: cors,key-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 16k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "8 16k"
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjI1MDAwMDAwMDB9.3tomIeyNGrqv-T95pnouk4OsMPKO-FZm5XpsQdrJLc8}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjUwMDAwMDAwMH0.CqUNvoaexyAipJyzuDKjgINP_827FDmYWpyIHD8jEMQ}
    ports:
      - "8000:8000"
    volumes:
      - ./docker/kong.yml:/var/lib/kong/kong.yml:ro
    networks:
      - supabase_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Supabase Studio ──────────────────────────────────────────────────────────
  studio:
    image: supabase/studio:20250113-83c9420
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
      meta:
        condition: service_started
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_secret_postgres_password_123}
      DEFAULT_ORGANIZATION_NAME: My Blog CMS
      DEFAULT_PROJECT_NAME: Blog CMS (Docker)
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjI1MDAwMDAwMDB9.3tomIeyNGrqv-T95pnouk4OsMPKO-FZm5XpsQdrJLc8}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjUwMDAwMDAwMH0.CqUNvoaexyAipJyzuDKjgINP_827FDmYWpyIHD8jEMQ}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    ports:
      - "3001:3000"
    networks:
      - supabase_net

  # ── Next.js Blog CMS ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-super_secret_nextauth_key_32_chars_123}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-super_secret_postgres_password_123}@db:5432/postgres}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}

      SUPABASE_URL: ${SUPABASE_URL:-http://kong:8000}
      SUPABASE_STORAGE_PUBLIC_URL: ${SUPABASE_STORAGE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MjUwMDAwMDAwMH0.CqUNvoaexyAipJyzuDKjgINP_827FDmYWpyIHD8jEMQ}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzAwMDAwMDAwLCJleHAiOjI1MDAwMDAwMDB9.3tomIeyNGrqv-T95pnouk4OsMPKO-FZm5XpsQdrJLc8}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-blog-media}
    volumes:
      - ./configuration.ts:/app/configuration.ts:ro
    networks:
      - supabase_net
    ports:
      - "3000:3000"
